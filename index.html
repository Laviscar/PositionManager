<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>仓位计划小工具</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <h1>仓位计划小工具</h1>
      <p>只控制大分类目标，个股自由配置，实时提醒超配与计划外持仓。</p>
    </header>

    <main>
      <nav class="tabs">
        <button class="tab active" data-tab="plan">计划设置</button>
        <button class="tab" data-tab="positions">持仓录入</button>
        <button class="tab" data-tab="dashboard">仓位仪表盘</button>
      </nav>

      <section id="plan" class="panel active"></section>
      <section id="positions" class="panel"></section>
      <section id="dashboard" class="panel"></section>
    </main>

    <template id="categoryRowTemplate">
      <div class="category-row">
        <input class="name-input" type="text" placeholder="分类名称" />
        <input class="pct-input" type="number" min="0" step="0.01" placeholder="比例 %" />
        <span class="target-amount">目标金额：0.00</span>
        <button class="danger remove-btn">删除</button>
      </div>
    </template>

    <script src="app.js"></script>
  </body>
</html>
